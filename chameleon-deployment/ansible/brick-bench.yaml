---
- name: Setup nvidia-container-toolkit-base
  hosts: worker
  tasks:
    - name: Install nvidia-container-toolkit
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present

    - name: Generate CDI
      ansible.builtin.command: nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml

    # The nvidia runtime class is required for the GPU operator, so we configure that
    # along with the CDI, which provides the nvidia-cdi runtime class. All GPU workload pods
    # will specify the nvidia-cdi runtime class in their manifests. All other pods should
    # be using containerd by default
    - name: Configure nvidia-container-runtime
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=containerd

    - name: Restart containerd
      ansible.builtin.systemd_service:
        name: containerd
        state: restarted
  become: true

- name: Setup gpu-operator
  hosts: controller
  tasks:
    - name: Add helm repository
      ansible.builtin.deb822_repository:
        name: helm
        signed_by: https://baltocdn.com/helm/signing.asc
        suites: all
        components: main
        uris: https://baltocdn.com/helm/stable/debian/
        state: present
        enabled: true
      become: true

    - name: Install helm
      ansible.builtin.apt:
        name: helm
        state: present
        update_cache: true
      become: true

    - name: Add helm repository
      kubernetes.core.helm_repository:
        name: nvidia
        repo_url: https://helm.ngc.nvidia.com/nvidia

    - name: Install gpu-operator
      kubernetes.core.helm:
        name: gpu-operator
        chart_ref: nvidia/gpu-operator
        release_namespace: gpu-operator
        create_namespace: true
        update_repo_cache: true
        wait: true
        values:
          cdi:
            enabled: true
          driver:
            enabled: false
          toolkit:
            enabled: false
  tags: gpu

- name: Install Stable Diffusion prerequisites
  hosts: controller
  vars:
    huggingface_cli_executable: "{{ home }}/.virtualenvs/huggingface-cli/bin/huggingface-cli"
  tasks:
    # All subsequent invocations of huggingface-cli will use this virtualenv.
    - name: Install huggingface-cli
      ansible.builtin.pip:
        name: "huggingface_hub[cli]"
        state: present
        virtualenv: "{{ home }}/.virtualenvs/huggingface-cli"
        virtualenv_command: python3 -m venv

    - name: Create directories
      ansible.builtin.file:
        path: "{{ home }}/models/{{ item }}"
        state: directory
        owner: cc
        mode: 0755
      loop:
        - checkpoints
        - clip

    - name: Login with token
      ansible.builtin.command: "{{ huggingface_cli_executable_interpreter }} login --token {{ token }}"

    - name: Download Stable Diffusion 3.5 model
      ansible.builtin.command: >
        {{ huggingface_cli_executable_interpreter }} download stabilityai/stable-diffusion-3.5-large sd3.5_large.safetensors
        --local-dir {{ home }}/models/checkpoints

    - name: Download text encoders
      ansible.builtin.command: >
        {{ huggingface_cli_executable_interpreter }} download stabilityai/stable-diffusion-3.5-large text_encoders/{{ item }}
        --local-dir {{ home }}/models/clip
      loop:
        - clip_g.safetensors
        - clip_l.safetensors
        - t5xxl_fp16.safetensors
  when: token is defined

- name: Deploy benchmark
  hosts: controller
  vars:
    kubernetes_venv_interpreter: "{{ home }}/.virtualenvs/kubernetes/bin/python3"
  tasks:
    - name: Create brick-bench namespace
      kubernetes.core.k8s:
        name: brick-bench
        kind: Namespace
        state: present
      vars:
        ansible_python_interpreter: "{{ kubernetes_venv_interpreter }}"

    - name: Apply image gen manifests
      kubernetes.core.k8s:
        definition: "{{ lookup('file', 'kubernetes-manifests/image-gen.yaml') | from_yaml_all }}"
        namespace: brick-bench
        state: present
        force: true
      vars:
        ansible_python_interpreter: "{{ kubernetes_venv_interpreter }}"
      tags: mani
